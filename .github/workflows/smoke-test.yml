name: Smoke Test

# Runs the same end-to-end smoke test used manually before every push, but
# automatically, on GitHub's own infrastructure - independent of whether
# local testing happened to catch something before pushing. This closes a
# real gap: previously, whether the app actually got tested before shipping
# depended entirely on remembering to do it by hand.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt --break-system-packages

      - name: Install Playwright + browser
        run: |
          pip install playwright --break-system-packages
          python -m playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          rm -f invoice_tool.db
          nohup python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 20s"
          cat /tmp/backend.log
          exit 1

      - name: Seed minimal data
        run: |
          curl -s -X POST http://localhost:8000/api/parties \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test Party"}'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm install --no-save serve
          npm run build

      - name: Serve frontend
        working-directory: frontend
        run: |
          npx serve -s dist -p 4173 > /tmp/frontend.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4173 > /dev/null; then
              echo "Frontend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start within 20s"
          cat /tmp/frontend.log
          exit 1

      - name: Run smoke test
        run: python3 smoke_test.py http://localhost:4173

      - name: Show backend logs on failure
        if: failure()
        run: cat /tmp/backend.log || true

name: Keep Backend Warm

# Render's free tier sleeps a service after 15 minutes with no incoming
# requests, and waking it back up takes 30-60 seconds.
#
# FIRST ATTEMPT (superseded): a cron firing every 10 minutes. This turned
# out to be unreliable in practice - GitHub explicitly documents scheduled
# workflows as "best effort" and will delay or skip high-frequency schedules,
# especially on repos without constant activity. Checked the actual run
# history after setup: only 3 runs happened over several hours, with real
# gaps of 3+ hours between them - nowhere near often enough to keep Render
# from sleeping.
#
# FIX: instead of asking GitHub's scheduler to fire precisely every 10
# minutes (unreliable), this triggers a job only every 4 hours (something
# GitHub's scheduler handles reliably), and that single job then loops
# internally - pinging every 8 minutes for its own ~5.75 hour lifetime using
# a plain bash sleep loop. That inner loop doesn't depend on GitHub's cron
# precision at all. The long overlap between one job's ~5.75h runtime and
# the next one starting ~4h later means even a delayed trigger still leaves
# continuous coverage.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # just under GitHub's 360-minute (6h) job cap
    steps:
      - name: Ping repeatedly for this job's lifetime
        run: |
          # Run for ~5h45m internally, pinging every 8 minutes. Comfortably
          # overlaps with the next scheduled job (~4h later), so coverage
          # never actually has a gap even if a trigger is delayed.
          #
          # IMPORTANT: GitHub Actions runs this with `set -e` by default, so
          # a bare `curl` that times out or fails at the network level (not
          # just a bad HTTP status - an actual connection failure) aborts
          # the ENTIRE script immediately. This bit us on the very first
          # real run: Render was cold, curl's own --max-time timeout fired,
          # and the whole 5h45m job died after ~30 seconds instead of
          # continuing to retry. The `|| echo "000"` below is what actually
          # matters here - it converts a curl-level failure into a plain
          # "000" status string instead of letting it kill the script.
          end_time=$((SECONDS + 345 * 60))
          count=0
          while [ $SECONDS -lt $end_time ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://khata-invoice-tool-1.onrender.com/api/health 2>/dev/null) || response="000"
            count=$((count + 1))
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Ping #$count -> HTTP $response"
            if [ "$response" != "200" ]; then
              echo "::warning::Ping #$count got $response instead of 200 (may just be a cold start still waking up)"
            fi
            sleep 480 || true
          done
          echo "Completed $count pings this run."

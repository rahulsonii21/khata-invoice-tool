name: Scheduled Backup

# Triggers a backup every 6 hours from OUTSIDE the app itself. This matters:
# the app also has an in-process nightly scheduler (scheduler.py), but that
# only fires if the Render process happens to be alive at exactly 2 AM. If
# the free tier had put it to sleep at that moment, the backup would
# silently never run - not a partial backup, none at all. This workflow
# doesn't have that problem: GitHub's scheduler runs independently, and the
# HTTP request itself will wake a sleeping Render service if needed.
#
# Also increases backup frequency from once nightly to 4x/day, narrowing
# the window of data you could lose if something went wrong between backups.
#
# Authenticates first: the app's PIN lock protects every API endpoint
# including this one (correctly - it's a real endpoint, and it should be
# protected). The APP_PIN secret below is a repository secret, never
# visible in this file or in any log output.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Log in and trigger backup
        env:
          APP_PIN: ${{ secrets.APP_PIN }}
        run: |
          # Get an auth token first (only matters if APP_PIN is actually set -
          # if the app doesn't require auth, /api/auth/login just returns
          # {"token": null, "required": false} and we simply skip the header)
          login_response=$(curl -s -X POST https://khata-invoice-tool-1.onrender.com/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"pin\": \"${APP_PIN}\"}")
          token=$(echo "$login_response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token') or '')")

          auth_header=""
          if [ -n "$token" ]; then
            auth_header="Authorization: Bearer $token"
          fi

          response=$(curl -s -w "\n%{http_code}" -X POST https://khata-invoice-tool-1.onrender.com/api/backup/run \
            -H "$auth_header")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Backup trigger failed with HTTP $http_code"
            exit 1
          fi
